<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--sur:#161616;--brd:#2a2a2a;--acc:#e8ff47;--txt:#f0f0f0;--mut:#666;--ok:#4ade80;--bad:#f87171;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
#loading .spin{width:40px;height:40px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:var(--mut);font-size:13px;font-family:'DM Mono',monospace}
header{width:100%;max-width:780px;padding:32px 24px 0;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--acc)}
.pw{display:flex;align-items:center;gap:12px}
.pb{width:160px;height:4px;background:var(--brd);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.pt{font-family:'DM Mono',monospace;font-size:12px;color:var(--mut)}
.sb{display:flex;gap:20px;padding:10px 16px;background:var(--sur);border:1px solid var(--brd);border-radius:40px;font-family:'DM Mono',monospace;font-size:12px;margin:20px 0 0}
.si{display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%}
.dot.c{background:var(--ok)}.dot.w{background:var(--bad)}
main{width:100%;max-width:780px;padding:28px 24px 60px}
.qc{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:28px;margin-bottom:20px;animation:si .3s ease}
@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qm{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.qn{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut)}
.badge{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid}
.bs{color:#a78bfa;border-color:#a78bfa33;background:#a78bfa11}
.bm{color:#60a5fa;border-color:#60a5fa33;background:#60a5fa11}
.bt{color:#fb923c;border-color:#fb923c33;background:#fb923c11}
.bf{color:#34d399;border-color:#34d39933;background:#34d39911}
.bM{color:#f472b6;border-color:#f472b633;background:#f472b611}
.bo{color:#fbbf24;border-color:#fbbf2433;background:#fbbf2411}
.qt{font-size:16px;font-weight:600;line-height:1.55;margin-bottom:22px;white-space:pre-wrap}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--brd);border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
.opt:hover:not(.locked){border-color:#444;background:#1e1e1e}
.tick{width:20px;height:20px;border-radius:50%;border:2px solid var(--brd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.opt.mul .tick{border-radius:4px}
.opt.sel .tick{border-color:var(--acc);background:var(--acc);color:#000}
.opt.ok{border-color:var(--ok);background:#4ade8011}
.opt.ok .tick{border-color:var(--ok);background:var(--ok);color:#000}
.opt.bad{border-color:var(--bad);background:#f8717111}
.opt.bad .tick{border-color:var(--bad);background:var(--bad);color:#000}
.opt.shw{border-color:var(--ok);background:#4ade8011}
.ol{font-size:14px;line-height:1.4}
input[type=text]{width:100%;background:#111;border:1px solid var(--brd);border-radius:8px;padding:13px 16px;color:var(--txt);font-family:'Syne',sans-serif;font-size:15px;outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--acc)}
input.ok{border-color:var(--ok)}
input.bad{border-color:var(--bad)}
.fg{display:flex;flex-direction:column;gap:10px}
.fr{display:flex;align-items:center;gap:12px}
.fk{font-family:'DM Mono',monospace;font-size:13px;color:var(--acc);min-width:24px;font-weight:600}
.fi{flex:1;background:#111;border:1px solid var(--brd);border-radius:8px;padding:10px 14px;color:var(--txt);font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--acc)}
.mg{display:flex;flex-direction:column;gap:10px}
.mr{display:flex;align-items:center;gap:12px}
.mp{flex:1;font-size:13px;line-height:1.4;padding:10px 14px;background:#111;border-radius:8px;border:1px solid var(--brd)}
.ma{color:var(--mut);flex-shrink:0;font-size:16px}
select{min-width:160px;background:#111;border:1px solid var(--brd);border-radius:8px;padding:10px 14px;color:var(--txt);font-family:'Syne',sans-serif;font-size:13px;outline:none;cursor:pointer;appearance:none;transition:border-color .15s}
select:focus{border-color:var(--acc)}
select.ok{border-color:var(--ok)}
select.bad{border-color:var(--bad)}
.ol-list{display:flex;flex-direction:column;gap:8px}
.oi{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#111;border:1px solid var(--brd);border-radius:8px;cursor:grab;user-select:none;transition:border-color .15s}
.oi:active{cursor:grabbing}
.oi.dragging{opacity:.4}
.oi.drag-over{border-color:var(--acc);background:#1e1e1e}
.oi.ok{border-color:var(--ok)}
.oi.bad{border-color:var(--bad)}
.oh{color:var(--mut);font-size:14px}
.on{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);min-width:20px}
.fb{margin-top:14px;padding:12px 16px;border-radius:8px;font-size:13px;display:none;animation:fi .25s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.fb.show{display:flex;gap:10px;align-items:flex-start}
.fb.ok{background:#4ade8015;border:1px solid #4ade8044;color:var(--ok)}
.fb.bad{background:#f8717115;border:1px solid #f8717144;color:var(--bad)}
.fbi{font-size:16px;flex-shrink:0}
.fbl{font-weight:700;margin-bottom:4px}
.fba{color:var(--txt);font-size:12px;line-height:1.5;margin-top:4px}

/* show answer box */
.sa-box{margin-top:14px;border-radius:8px;overflow:hidden;border:1px solid #fbbf2433}
.sa-toggle{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fbbf2409;cursor:pointer;user-select:none;font-size:12px;font-weight:700;color:#fbbf24;letter-spacing:.05em}
.sa-toggle:hover{background:#fbbf2415}
.sa-toggle .sa-icon{font-size:14px;transition:transform .2s}
.sa-toggle.open .sa-icon{transform:rotate(180deg)}
.sa-body{display:none;padding:12px 14px;background:#fbbf2408;font-size:13px;line-height:1.6;color:var(--txt)}
.sa-body.open{display:block;animation:fi .2s ease}
.sa-body .sa-row{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid #2a2a2a}
.sa-body .sa-row:last-child{border-bottom:none}
.sa-body .sa-key{color:#fbbf24;min-width:120px;font-size:12px;flex-shrink:0}
.sa-body .sa-val{font-weight:600}

.qa{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.btn{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:11px 22px;border-radius:8px;cursor:pointer;border:none;transition:all .15s}
.bchk{background:var(--acc);color:#000}
.bchk:hover{background:#d4eb3a}
.bchk:disabled{opacity:.4;cursor:not-allowed}
.bnx,.bpv{background:transparent;color:var(--txt);border:1px solid var(--brd)}
.bpv{color:var(--mut)}
.bnx:hover,.bpv:hover{border-color:#555;background:#1e1e1e;color:var(--txt)}
.bnx:disabled,.bpv:disabled{opacity:.3;cursor:not-allowed}
#res{display:none;width:100%;max-width:780px;padding:60px 24px;text-align:center}
.rc{width:140px;height:140px;border-radius:50%;border:3px solid var(--acc);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 28px}
.rp{font-size:36px;font-weight:800;color:var(--acc);line-height:1}
.rs{font-size:11px;color:var(--mut);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.rt{font-size:28px;font-weight:800;margin-bottom:12px}
.rst{display:flex;justify-content:center;gap:32px;margin:24px 0 36px}
.ri{text-align:center}
.rv{font-size:28px;font-weight:800}
.rl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em}
.ri.c .rv{color:var(--ok)}.ri.w .rv{color:var(--bad)}
.brst{background:var(--acc);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:14px 36px;border:none;border-radius:8px;cursor:pointer}
.brst:hover{background:#d4eb3a}
.nd{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.nd button{width:28px;height:28px;border-radius:6px;border:1px solid var(--brd);background:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);transition:all .15s}
.nd button:hover{border-color:#555;color:var(--txt)}
.nd button.act{border-color:var(--acc);color:var(--acc)}
.nd button.aok{background:#4ade8022;border-color:var(--ok);color:var(--ok)}
.nd button.abad{background:#f8717122;border-color:var(--bad);color:var(--bad)}
.at{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.at td{padding:3px 8px;border-bottom:1px solid #2a2a2a;color:var(--txt);line-height:1.4}
.at td:first-child{color:var(--mut);width:45%}
@media(max-width:600px){.mr{flex-direction:column;align-items:stretch}.ma{display:none}select{min-width:100%}}
</style>
</head>
<body>
<div id="loading">
  <div class="spin"></div>
  <p>Savollar yuklanmoqda...</p>
</div>
<header id="hdr" style="display:none">
  <span class="logo">⬡ AI Quiz</span>
  <div class="pw">
    <div class="pb"><div class="pf" id="pf"></div></div>
    <span class="pt" id="pt">0 / 0</span>
  </div>
</header>
<div style="display:flex;justify-content:center">
  <div class="sb" id="sb" style="display:none">
    <div class="si"><div class="dot c"></div><span id="sc">0</span> to'g'ri</div>
    <div class="si"><div class="dot w"></div><span id="sw">0</span> noto'g'ri</div>
    <div class="si" style="color:var(--mut)"><span id="sr">0</span> qoldi</div>
  </div>
</div>
<main id="qmain" style="display:none">
  <div class="nd" id="nd"></div>
  <div id="qw"></div>
</main>
<div id="res"></div>
<script>
let Q=[],cur=0,ans={},scOk=0,scBad=0,dragSrc=null;
const TL={single:"Bir javobli",multiple:"Ko'p javobli",text:"Matnli",fill_in:"To'ldiring",matching:"Juftlashtirish",ordering:"Tartibga soling"};
const BC={single:"bs",multiple:"bm",text:"bt",fill_in:"bf",matching:"bM",ordering:"bo"};
function h(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function norm(s){return String(s).trim().toLowerCase().replace(/\s+/g," ");}
function shuf(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

fetch('questions.json')
  .then(r=>{if(!r.ok)throw new Error('Fayl topilmadi');return r.json();})
  .then(data=>{
    Q=data;
    document.getElementById('loading').style.display='none';
    document.getElementById('hdr').style.display='flex';
    document.getElementById('sb').style.display='flex';
    document.getElementById('qmain').style.display='block';
    buildDots();render();
  })
  .catch(err=>{
    document.getElementById('loading').innerHTML=
      `<p style="color:var(--bad);text-align:center">⚠ questions.json yuklanmadi.<br><small>${err.message}</small></p>`;
  });

function buildDots(){
  const w=document.getElementById("nd");w.innerHTML="";
  Q.forEach((q,i)=>{
    const b=document.createElement("button");
    b.textContent=i+1;b.dataset.i=i;w.appendChild(b);
  });
  w.addEventListener("click",e=>{
    const b=e.target.closest("button");
    if(b){cur=+b.dataset.i;render();}
  });
  syncDots();
}
function syncDots(){
  document.querySelectorAll("#nd button").forEach((b,i)=>{
    b.className="";
    const a=ans[Q[i].id];
    if(i===cur)b.classList.add("act");
    if(a?.checked&&a.correct===true)b.classList.add("aok");
    if(a?.checked&&a.correct===false)b.classList.add("abad");
  });
}
function updHUD(){
  const done=Object.keys(ans).length;
  const pct=Q.length?(done/Q.length*100):0;
  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("pt").textContent=done+" / "+Q.length;
  document.getElementById("sc").textContent=scOk;
  document.getElementById("sw").textContent=scBad;
  document.getElementById("sr").textContent=Q.length-done;
}

/* ---- SHOW ANSWER ---- */
function buildShowAnswer(q){
  const ca=q.correct_answer;
  let content="";
  if(q.type==="single"||q.type==="text"){
    content=`<div class="sa-row"><span class="sa-key">To'g'ri javob</span><span class="sa-val">${h(String(ca))}</span></div>`;
  }else if(q.type==="multiple"){
    const arr=Array.isArray(ca)?ca:[ca];
    content=arr.map(v=>`<div class="sa-row"><span class="sa-key">✓</span><span class="sa-val">${h(v)}</span></div>`).join("");
  }else if(q.type==="fill_in"){
    content=Object.entries(ca).map(([k,v])=>
      `<div class="sa-row"><span class="sa-key">${h(k)}</span><span class="sa-val">${h(v)}</span></div>`).join("");
  }else if(q.type==="matching"){
    content=Object.entries(ca).map(([k,v])=>
      `<div class="sa-row"><span class="sa-key">${h(k)}</span><span class="sa-val">→ ${h(v)}</span></div>`).join("");
  }else if(q.type==="ordering"){
    content=ca.map((v,i)=>
      `<div class="sa-row"><span class="sa-key">${i+1}-qadam</span><span class="sa-val">${h(v)}</span></div>`).join("");
  }
  return `
<div class="sa-box">
  <div class="sa-toggle" id="sa-toggle" onclick="toggleSA()">
    <span>👁 Show Answer</span><span class="sa-icon">▾</span>
  </div>
  <div class="sa-body" id="sa-body">${content}</div>
</div>`;
}

function toggleSA(){
  const tog=document.getElementById("sa-toggle");
  const bod=document.getElementById("sa-body");
  if(!tog||!bod)return;
  tog.classList.toggle("open");
  bod.classList.toggle("open");
}

function render(){
  syncDots();
  const q=Q[cur],st=ans[q.id],ck=st?.checked||false;
  let body="";
  if(q.type==="single")        body=rSingle(q,st,ck);
  else if(q.type==="multiple") body=rMulti(q,st,ck);
  else if(q.type==="text")     body=rText(q,st,ck);
  else if(q.type==="fill_in")  body=rFill(q,st,ck);
  else if(q.type==="matching") body=rMatch(q,st,ck);
  else if(q.type==="ordering") body=rOrder(q,st,ck);
  document.getElementById("qw").innerHTML=`
<div class="qc">
  <div class="qm"><span class="qn">#${q.id}</span><span class="badge ${BC[q.type]||'bs'}">${TL[q.type]||q.type}</span></div>
  <div class="qt">${h(q.question)}</div>
  ${body}
  ${ck?buildFB(q,st.correct):""}
  ${buildShowAnswer(q)}
  <div class="qa">
    <button class="btn bpv" id="bpv" ${cur===0?"disabled":""}>← Oldingi</button>
    <button class="btn bchk" id="bchk" ${ck?"disabled":""}>${ck?"Tekshirildi ✓":"Tekshirish"}</button>
    <button class="btn bnx" id="bnx" ${cur===Q.length-1?"disabled":""}>Keyingi →</button>
  </div>
</div>`;
  document.getElementById("bpv").onclick=()=>{cur=Math.max(0,cur-1);render();};
  document.getElementById("bnx").onclick=()=>{cur=Math.min(Q.length-1,cur+1);render();};
  document.getElementById("bchk").onclick=chk;
  if(q.type==="ordering"&&!ck)setupDrag(q);
  updHUD();
}

function rSingle(q,st,ck){
  const uv=st?.value;
  return "<div class='opts'>"+q.options.map(o=>{
    let c="opt";
    if(!ck&&uv===o)c+=" sel";
    if(ck){if(o===q.correct_answer)c+=" ok";else if(o===uv)c+=" bad";}
    const t=(ck&&o===q.correct_answer)?"✓":(ck&&o===uv)?"✕":(!ck&&uv===o)?"✓":"";
    return `<div class="${c}${ck?" locked":""}" data-opt="${h(o)}"><div class="tick">${t}</div><span class="ol">${h(o)}</span></div>`;
  }).join("")+"</div>";
}
function rMulti(q,st,ck){
  const uv=st?.value||[];
  const ca=Array.isArray(q.correct_answer)?q.correct_answer:[q.correct_answer];
  return "<div class='opts'>"+q.options.map(o=>{
    let c="opt mul";
    if(!ck&&uv.includes(o))c+=" sel";
    if(ck){
      if(ca.includes(o)&&uv.includes(o))c+=" ok";
      else if(!ca.includes(o)&&uv.includes(o))c+=" bad";
      else if(ca.includes(o))c+=" shw";
    }
    const t=uv.includes(o)?"✓":"";
    return `<div class="${c}${ck?" locked":""}" data-opt="${h(o)}"><div class="tick">${t}</div><span class="ol">${h(o)}</span></div>`;
  }).join("")+"</div>";
}
function rText(q,st,ck){
  const v=st?.value||"",c=ck?(st?.correct?"ok":"bad"):"";
  return `<input type="text" class="${c}" id="ti" placeholder="Javobingizni yozing..." value="${h(v)}" ${ck?"disabled":""}>`;
}
function rFill(q,st,ck){
  const uv=st?.value||{};
  return "<div class='fg'>"+Object.keys(q.correct_answer).map(k=>{
    const v=uv[k]||"",ok2=ck&&norm(v)===norm(q.correct_answer[k]),c=ck?(ok2?"ok":"bad"):"";
    return `<div class="fr"><span class="fk">${h(k)}</span><input type="text" class="fi ${c}" id="fi_${h(k)}" value="${h(v)}" placeholder="${h(k)}..." ${ck?"disabled":""}></div>`;
  }).join("")+"</div>";
}
function rMatch(q,st,ck){
  const ca=q.correct_answer,prompts=Object.keys(ca),opts=shuf(Object.values(ca)),uv=st?.value||{};
  return "<div class='mg'>"+prompts.map((p,i)=>{
    const ch=uv[p]||"",ok2=ck&&ch===ca[p],c=ck?(ok2?"ok":"bad"):"";
    const optHtml=opts.map(o=>`<option value="${h(o)}"${ch===o?" selected":""}>${h(o)}</option>`).join("");
    return `<div class="mr"><div class="mp">${h(p)}</div><span class="ma">→</span>
      <select class="${c}" id="ms${i}" ${ck?"disabled":""}><option value="">Tanlang...</option>${optHtml}</select></div>`;
  }).join("")+"</div>";
}
function rOrder(q,st,ck){
  const order=st?.value||[...q.options];
  return "<div class='ol-list' id='ollist'>"+order.map((item,i)=>{
    const ok2=ck&&item===q.correct_answer[i],c=ck?(ok2?" ok":" bad"):"";
    return `<div class="oi${c}" draggable="${!ck}" data-i="${i}">
      <span class="oh">⠿</span><span class="on">${i+1}</span><span>${h(item)}</span></div>`;
  }).join("")+"</div>";
}
function buildFB(q,ok){
  const cls=ok?"ok":"bad",lbl=ok?"To'g'ri!":"Noto'g'ri!",icon=ok?"✓":"✕";
  let det="";
  if(!ok){
    if(q.type==="single"||q.type==="text")
      det=`<div class="fba">To'g'ri javob: <strong>${h(String(q.correct_answer))}</strong></div>`;
    else if(q.type==="multiple")
      det=`<div class="fba">To'g'ri: <strong>${h(q.correct_answer.join(", "))}</strong></div>`;
    else if(q.type==="fill_in"){
      const rows=Object.entries(q.correct_answer).map(([k,v])=>`<tr><td>${h(k)}</td><td><strong>${h(v)}</strong></td></tr>`).join("");
      det=`<div class="fba"><table class="at">${rows}</table></div>`;
    }else if(q.type==="matching"){
      const rows=Object.entries(q.correct_answer).map(([k,v])=>`<tr><td>${h(k)}</td><td>→ <strong>${h(v)}</strong></td></tr>`).join("");
      det=`<div class="fba"><table class="at">${rows}</table></div>`;
    }else if(q.type==="ordering")
      det=`<div class="fba">To'g'ri tartib: <strong>${h(q.correct_answer.join(" → "))}</strong></div>`;
  }
  return `<div class="fb ${cls} show"><span class="fbi">${icon}</span><div><div class="fbl">${lbl}</div>${det}</div></div>`;
}
function setupDrag(q){
  const list=document.getElementById("ollist");
  if(!list)return;
  if(!ans[q.id])ans[q.id]={value:[...q.options],checked:false};
  list.querySelectorAll(".oi").forEach((el,i)=>{
    el.addEventListener("dragstart",()=>{dragSrc=i;el.classList.add("dragging");});
    el.addEventListener("dragend",()=>el.classList.remove("dragging"));
    el.addEventListener("dragover",e=>{e.preventDefault();el.classList.add("drag-over");});
    el.addEventListener("dragleave",()=>el.classList.remove("drag-over"));
    el.addEventListener("drop",e=>{
      e.preventDefault();el.classList.remove("drag-over");
      if(dragSrc===null||dragSrc===i)return;
      const arr=ans[q.id].value;
      const mv=arr.splice(dragSrc,1)[0];arr.splice(i,0,mv);dragSrc=null;
      list.innerHTML=arr.map((item,idx)=>
        `<div class="oi" draggable="true" data-i="${idx}">
          <span class="oh">⠿</span><span class="on">${idx+1}</span><span>${h(item)}</span></div>`
      ).join("");
      setupDrag(q);
    });
  });
}
document.addEventListener("click",e=>{
  const el=e.target.closest(".opt:not(.locked)");
  if(!el)return;
  const q=Q[cur];
  const opt=el.dataset.opt;
  if(q.type==="single"){
    document.querySelectorAll(".opt").forEach(o=>{o.classList.remove("sel");o.querySelector(".tick").textContent="";});
    el.classList.add("sel");el.querySelector(".tick").textContent="✓";
    if(!ans[q.id])ans[q.id]={};
    ans[q.id].value=opt;ans[q.id].checked=false;
  }else if(q.type==="multiple"){
    if(!ans[q.id])ans[q.id]={value:[],checked:false};
    const arr=ans[q.id].value,idx=arr.indexOf(opt);
    if(idx>=0){arr.splice(idx,1);el.classList.remove("sel");el.querySelector(".tick").textContent="";}
    else{arr.push(opt);el.classList.add("sel");el.querySelector(".tick").textContent="✓";}
  }
});
function chk(){
  const q=Q[cur];let uv=ans[q.id]?.value,ok=false;
  if(q.type==="single"){
    if(!uv){alert("Javob tanlang!");return;}
    ok=uv===q.correct_answer;
  }else if(q.type==="multiple"){
    if(!uv||!uv.length){alert("Kamida bir javob tanlang!");return;}
    const ca=Array.isArray(q.correct_answer)?q.correct_answer:[q.correct_answer];
    ok=ca.length===uv.length&&ca.every(c=>uv.includes(c));
  }else if(q.type==="text"){
    const inp=document.getElementById("ti");
    uv=inp?inp.value.trim():(uv||"");
    if(!uv){alert("Javob yozing!");return;}
    ok=norm(uv)===norm(String(q.correct_answer));
  }else if(q.type==="fill_in"){
    if(!ans[q.id])ans[q.id]={value:{},checked:false};
    const keys=Object.keys(q.correct_answer);let allFilled=true;
    keys.forEach(k=>{
      const inp=document.getElementById("fi_"+k);
      const v=inp?inp.value.trim():"";
      if(!v)allFilled=false;
      ans[q.id].value[k]=v;
    });
    if(!allFilled){alert("Barcha maydonlarni to'ldiring!");return;}
    uv=ans[q.id].value;
    ok=keys.every(k=>norm(uv[k])===norm(q.correct_answer[k]));
  }else if(q.type==="matching"){
    if(!ans[q.id])ans[q.id]={value:{},checked:false};
    const prompts=Object.keys(q.correct_answer);let allSel=true;
    prompts.forEach((p,i)=>{
      const sel=document.getElementById("ms"+i);
      const v=sel?sel.value:"";
      if(!v)allSel=false;
      ans[q.id].value[p]=v;
    });
    if(!allSel){alert("Barcha juftliklarni tanlang!");return;}
    uv=ans[q.id].value;
    ok=prompts.every(p=>uv[p]===q.correct_answer[p]);
  }else if(q.type==="ordering"){
    if(!ans[q.id])ans[q.id]={value:[...q.options],checked:false};
    uv=ans[q.id].value;
    ok=q.correct_answer.every((item,i)=>item===uv[i]);
  }
  ans[q.id]={value:uv,correct:ok,checked:true};
  if(ok)scOk++;else scBad++;
  const allDone=Object.keys(ans).length===Q.length&&Object.values(ans).every(a=>a.checked);
  if(allDone){render();setTimeout(showRes,600);}
  else{render();if(ok&&cur<Q.length-1)setTimeout(()=>{cur++;render();},1200);}
}
function showRes(){
  document.getElementById("qmain").style.display="none";
  document.getElementById("hdr").style.display="none";
  document.getElementById("sb").style.display="none";
  const pct=Math.round(scOk/Q.length*100);
  document.getElementById("res").style.display="block";
  document.getElementById("res").innerHTML=`
    <div class="rc"><div class="rp">${pct}%</div><div class="rs">natija</div></div>
    <div class="rt">${pct>=80?"Ajoyib natija! 🎉":pct>=50?"Yaxshi urinish!":"Ko'proq mashq kerak."}</div>
    <div class="rst">
      <div class="ri c"><div class="rv">${scOk}</div><div class="rl">To'g'ri</div></div>
      <div class="ri w"><div class="rv">${scBad}</div><div class="rl">Noto'g'ri</div></div>
      <div class="ri"><div class="rv">${Q.length}</div><div class="rl">Jami</div></div>
    </div>
    <button class="brst" id="rbtn">Qaytadan boshlash</button>`;
  document.getElementById("rbtn").onclick=restart;
}
function restart(){
  ans={};scOk=0;scBad=0;cur=0;
  document.getElementById("res").style.display="none";
  document.getElementById("res").innerHTML="";
  document.getElementById("hdr").style.display="flex";
  document.getElementById("sb").style.display="flex";
  document.getElementById("qmain").style.display="block";
  buildDots();render();
}
</script>
